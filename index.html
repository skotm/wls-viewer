<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMeDAS Explorer - HIG Edition</title>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: rgba(28, 28, 30, 0.75);
            --surface-drawer: rgba(28, 28, 30, 0.85);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
            --border-color: rgba(84, 84, 88, 0.4);
            --accent-color: #0A84FF;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            --rail-width: 68px;
        }

        body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex;
            overflow: hidden;
        }

        /* ========== Navigation Rail ========== */
        #nav-rail {
            width: var(--rail-width);
            height: 100%;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            position: relative;
        }

        .nav-btn {
            width: 44px; height: 44px;
            margin-bottom: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .nav-btn.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .nav-btn svg { width: 24px; height: 24px; }
        .spacer { flex: 1; }

        /* ========== Drawer Panel (Ranking) ========== */
        #drawer-panel {
            position: absolute;
            left: var(--rail-width);
            top: 0;
            width: 320px;
            height: 100%;
            background: var(--surface-drawer);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--border-color);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 999;
            display: flex;
            flex-direction: column;
        }
        #drawer-panel.show { transform: translateX(0); }
        
        .drawer-header {
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
        }
        
        #ranking-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .rank-item:hover { background: rgba(255, 255, 255, 0.1); }
        .rank-num { color: var(--text-secondary); display: inline-block; width: 24px; font-size: 12px; }
        .rank-name { flex: 1; font-weight: 500; font-size: 14px; }
        .rank-val { font-weight: 700; font-size: 16px; }

        /* ========== Map Container ========== */
        #map { flex: 1; height: 100%; position: relative; }

        /* ========== Floating Detail Card ========== */
        #detail-card {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 280px;
            background: var(--surface-drawer);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(120%);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1001;
        }
        #detail-card.show { transform: translateY(0); }

        .card-header { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .card-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 15px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px; border-radius: 12px; display: flex; flex-direction: column;
        }
        .data-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 2px; }
        .data-value { font-size: 16px; font-weight: 600; }
        .data-value span { font-size: 12px; font-weight: 400; margin-left: 2px; }

        /* ========== Status Bar ========== */
        #status-bar {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <nav id="nav-rail">
        <div class="nav-btn active" id="btn-temp" title="気温レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
        </div>
        <div class="nav-btn" id="btn-prec" title="降水量・警報レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 17.58A5 5 0 0 1 18 20a5 5 0 1 1-6-8.58V5a2 2 0 1 1 4 0v6.42a4.99 4.99 0 0 1 4 6.16z"/></svg>
        </div>
        <div class="nav-btn" id="btn-wind" title="風向・風速レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17.5" y1="19" x2="17.5" y2="19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/><line x1="12" y1="17" x2="22" y2="17"/></svg>
        </div>
        
        <div class="spacer"></div>
        
        <div class="nav-btn" id="btn-rank" title="全国ランキング">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </div>
    </nav>

    <div id="drawer-panel">
        <div class="drawer-header" id="rank-title">全国ランキング</div>
        <div id="ranking-list"></div>
    </div>

    <div id="map">
        <div id="status-bar">データ読込中...</div>
        
        <div id="detail-card">
            <div class="card-header" id="st-name">地点名</div>
            <div class="card-time" id="st-time">--:-- 観測</div>
            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">気温</span>
                    <span class="data-value" id="val-temp">--<span>℃</span></span>
                </div>
                <div class="data-item">
                    <span class="data-label">降水量</span>
                    <span class="data-value" id="val-prec">--<span>mm</span></span>
                </div>
                <div class="data-item">
                    <span class="data-label">風速</span>
                    <span class="data-value" id="val-wind">--<span>m/s</span></span>
                </div>
                <div class="data-item">
                    <span class="data-label">湿度</span>
                    <span class="data-value" id="val-hum">--<span>%</span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const JMA_BASE = "https://www.jma.go.jp/bosai/amedas";
        let map, amedasTable = {};
        let geojson = { type: 'FeatureCollection', features: [] };
        let currentMode = 'temp'; // temp, prec, wind
        let currentObsTime = '--:--';

        // 矢印アイコン（風向用）の生成
        const arrowSvg = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 2 L20 20 L12 16 L4 20 Z" /></svg>`;
        const arrowImg = new Image();
        arrowImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(arrowSvg);

        function getTempColor(temp) {
            if (temp === null) return '#8E8E93';
            if (temp >= 35) return '#FF3B30';
            if (temp >= 30) return '#FF9500';
            if (temp >= 20) return '#FFCC00';
            if (temp >= 10) return '#34C759';
            if (temp >= 0)  return '#0A84FF';
            return '#5856D6';
        }

        async function init() {
            // CartoDB Dark Matter（シンプルで黒い地図）を採用
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                center: [137.0, 38.0],
                zoom: 5,
                pitch: 40,
                hash: true
            });

            arrowImg.onload = () => map.addImage('wind-arrow', arrowImg);

            map.on('load', async () => {
                try {
                    // 日本の都道府県境界線を明示的に追加（白黒デザインに合わせてグレーで表現）
                    map.addSource('pref-boundary', {
                        type: 'geojson',
                        data: 'https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson'
                    });
                    map.addLayer({
                        id: 'pref-line',
                        type: 'line',
                        source: 'pref-boundary',
                        paint: { 'line-color': '#555555', 'line-width': 1.5, 'line-opacity': 0.8 }
                    });

                    // 気象庁データの取得
                    const timeRes = await fetch(`${JMA_BASE}/data/latest_time.txt`);
                    const datetime = (await timeRes.text()).trim();
                    currentObsTime = `${datetime.substring(8,10)}:${datetime.substring(10,12)}`;
                    document.getElementById('status-bar').innerText = `LIVE: ${currentObsTime} 更新`;

                    const [tableRes, dataRes] = await Promise.all([
                        fetch(`${JMA_BASE}/const/amedastable.json`),
                        fetch(`${JMA_BASE}/data/map/${datetime}.json`)
                    ]);
                    amedasTable = await tableRes.json();
                    const amedasData = await dataRes.json();

                    // GeoJSON Featureの作成
                    geojson.features = Object.keys(amedasData).map(id => {
                        const master = amedasTable[id];
                        if (!master) return null;
                        const obs = amedasData[id];
                        const temp = obs.temp ? obs.temp[0] : null;
                        const prec = obs.precipitation1h ? obs.precipitation1h[0] : 0;
                        const wind = obs.wind ? obs.wind[0] : null;
                        const windDir = obs.wind && obs.wind[1] !== undefined ? obs.wind[1] : 0;
                        
                        return {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [master.lon[0] + master.lon[1]/60, master.lat[0] + master.lat[1]/60] },
                            properties: {
                                id, name: master.kjName,
                                temp: temp, prec: prec, wind: wind, windDir: windDir, hum: obs.humidity ? obs.humidity[0] : null,
                                tempColor: getTempColor(temp),
                                precColor: prec >= 20 ? '#FF3B30' : (prec >= 10 ? '#FF9500' : (prec > 0 ? '#0A84FF' : '#444444'))
                            }
                        };
                    }).filter(f => f !== null && f.geometry.coordinates[0]);

                    // ★警報レイヤー（Voronoi ポリゴン生成）
                    // Turf.jsを使って観測点から疑似的なエリアメッシュを作成
                    const voronoiPolys = turf.voronoi(geojson, { bbox: [122.9, 24.0, 153.9, 45.6] });
                    voronoiPolys.features.forEach((poly, i) => {
                        if (poly) poly.properties = geojson.features[i].properties;
                    });
                    voronoiPolys.features = voronoiPolys.features.filter(p => p != null);

                    // 警報（大雨エリア）レイヤー追加
                    map.addSource('voronoi', { type: 'geojson', data: voronoiPolys });
                    map.addLayer({
                        id: 'layer-prec-area',
                        type: 'fill',
                        source: 'voronoi',
                        layout: { 'visibility': 'none' },
                        paint: {
                            'fill-color': ['get', 'precColor'],
                            'fill-opacity': ['case', ['>', ['get', 'prec'], 0], 0.35, 0], // 雨が降っているエリアだけ色付け
                            'fill-outline-color': 'transparent'
                        }
                    }, 'pref-line'); // 都道府県境界線の下に敷く

                    // アメダス地点ソース追加
                    map.addSource('amedas', { type: 'geojson', data: geojson });

                    // 気温・降水量のサークルレイヤー
                    map.addLayer({
                        id: 'layer-points',
                        type: 'circle',
                        source: 'amedas',
                        paint: {
                            'circle-radius': ['interpolate', ['linear'], ['zoom'], 5, 4, 10, 12],
                            'circle-color': ['get', 'tempColor'],
                            'circle-stroke-width': 1.5,
                            'circle-stroke-color': '#000000'
                        }
                    });

                    // ★風向・風速レイヤー（矢印アイコン）
                    map.addLayer({
                        id: 'layer-wind',
                        type: 'symbol',
                        source: 'amedas',
                        layout: {
                            'visibility': 'none',
                            'icon-image': 'wind-arrow',
                            'icon-size': ['interpolate', ['linear'], ['zoom'], 5, 0.4, 10, 0.8],
                            // 風向(1=NNE...16=N)から角度を計算。風が吹いていく方向に矢印を向けるため+180度
                            'icon-rotate': ['+', ['*', ['get', 'windDir'], 22.5], 180],
                            'icon-allow-overlap': true
                        },
                        paint: {
                            // 無風（windDir == 0）の場合は非表示
                            'icon-opacity': ['case', ['==', ['get', 'windDir'], 0], 0, 1]
                        }
                    });

                    // インタラクション
                    map.on('click', 'layer-points', (e) => showDetail(e.features[0].properties));
                    map.on('click', 'layer-wind', (e) => showDetail(e.features[0].properties));
                    ['layer-points', 'layer-wind'].forEach(l => {
                        map.on('mouseenter', l, () => map.getCanvas().style.cursor = 'pointer');
                        map.on('mouseleave', l, () => map.getCanvas().style.cursor = '');
                    });

                    // 初期ランキング表示用
                    updateRanking();

                } catch (e) {
                    console.error(e);
                    document.getElementById('status-bar').innerText = "データ取得エラー";
                }
            });
        }

        // --- モード切替制御 ---
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            if (mode === 'temp') {
                map.setLayoutProperty('layer-points', 'visibility', 'visible');
                map.setPaintProperty('layer-points', 'circle-color', ['get', 'tempColor']);
                map.setLayoutProperty('layer-prec-area', 'visibility', 'none');
                map.setLayoutProperty('layer-wind', 'visibility', 'none');
            } else if (mode === 'prec') {
                map.setLayoutProperty('layer-points', 'visibility', 'visible');
                map.setPaintProperty('layer-points', 'circle-color', ['get', 'precColor']);
                map.setLayoutProperty('layer-prec-area', 'visibility', 'visible');
                map.setLayoutProperty('layer-wind', 'visibility', 'none');
            } else if (mode === 'wind') {
                map.setLayoutProperty('layer-points', 'visibility', 'none');
                map.setLayoutProperty('layer-prec-area', 'visibility', 'none');
                map.setLayoutProperty('layer-wind', 'visibility', 'visible');
            }
            
            // ドロワーが開いている場合はランキングの内容も即座に更新する
            updateRanking();
        }

        // --- ランキング生成処理 ---
        function updateRanking() {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            
            let sorted = [];
            if (currentMode === 'temp') {
                document.getElementById('rank-title').innerText = '全国気温ランキング (高温順)';
                sorted = geojson.features.filter(f => f.properties.temp !== null).sort((a,b) => b.properties.temp - a.properties.temp);
            } else if (currentMode === 'prec') {
                document.getElementById('rank-title').innerText = '全国降水量ランキング';
                sorted = geojson.features.filter(f => f.properties.prec > 0).sort((a,b) => b.properties.prec - a.properties.prec);
            } else if (currentMode === 'wind') {
                document.getElementById('rank-title').innerText = '全国風速ランキング';
                sorted = geojson.features.filter(f => f.properties.wind !== null).sort((a,b) => b.properties.wind - a.properties.wind);
            }
            
            sorted.slice(0, 50).forEach((f, i) => {
                let valStr = '', colorStr = var(--text-primary);
                if (currentMode === 'temp') { valStr = `${f.properties.temp}℃`; colorStr = f.properties.tempColor; }
                if (currentMode === 'prec') { valStr = `${f.properties.prec}mm`; colorStr = f.properties.precColor; }
                if (currentMode === 'wind') { valStr = `${f.properties.wind}m/s`; colorStr = '#FFFFFF'; }
                
                const item = document.createElement('div');
                item.className = 'rank-item';
                item.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <span class="rank-num">${i+1}</span>
                        <span class="rank-name">${f.properties.name}</span>
                    </div>
                    <span class="rank-val" style="color:${colorStr}">${valStr}</span>
                `;
                item.onclick = () => {
                    map.flyTo({ center: f.geometry.coordinates, zoom: 10, essential: true });
                    showDetail(f.properties);
                };
                list.appendChild(item);
            });
        }

        function showDetail(props) {
            document.getElementById('st-name').innerText = props.name;
            document.getElementById('st-time').innerText = `${currentObsTime} 観測`;
            document.getElementById('val-temp').innerHTML = `${props.temp ?? '--'}<span>℃</span>`;
            document.getElementById('val-prec').innerHTML = `${props.prec ?? '0'}<span>mm</span>`;
            document.getElementById('val-wind').innerHTML = `${props.wind ?? '--'}<span>m/s</span>`;
            document.getElementById('val-hum').innerHTML = `${props.hum ?? '--'}<span>%</span>`;
            
            document.getElementById('detail-card').classList.add('show');
        }

        // イベントリスナー
        document.getElementById('btn-temp').onclick = () => setMode('temp');
        document.getElementById('btn-prec').onclick = () => setMode('prec');
        document.getElementById('btn-wind').onclick = () => setMode('wind');
        document.getElementById('btn-rank').onclick = () => {
            const drawer = document.getElementById('drawer-panel');
            drawer.classList.toggle('show');
            document.getElementById('btn-rank').classList.toggle('active');
        };

        // 地図外クリックで詳細カードを閉じる
        document.getElementById('map').addEventListener('mousedown', (e) => {
            if(e.target.id === 'map') document.getElementById('detail-card').classList.remove('show');
        });

        init();
    </script>
</body>
</html>
